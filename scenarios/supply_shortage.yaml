# ═══════════════════════════════════════════════════════════
# 시나리오: 자재 부족 (Supply Shortage)
# 초기 자재 재고가 매우 낮고, 보충이 느리며, AGV 고장이 빈번.
# 공급 에이전트와 재고 에이전트가 적극 대응해야 한다.
# ═══════════════════════════════════════════════════════════
name: "자재 부족 (Supply Shortage)"
description: "자재 재고 1/3, 자재 입고 확률 절반, AGV 변경 빈번. 공급망 에이전트의 자재 관리 능력을 테스트."

sensors:
  press:
    vibration:
      baseline: 1.80
      noise_std: 0.15
      drift_rate: 0.10
    oil_temp:
      baseline: 42.0
      noise_std: 0.5
      drift_rate: 0.03
  weld:
    weld_current:
      baseline: 280.0
      noise_std: 5.0

warehouse:
  stock: 60
  safety_stock: 50
  service_level_target: 0.95
  demand_std: 10.0
  leadtime_mean: 6.0
  leadtime_std: 3.0
  avg_demand_per_cycle: 4.0

materials:
  steel_stock: 250
  weld_wire: 4.0
  shield_gas: 40.0
  restock_threshold: 80

demand:
  shipment_interval: 2
  shipment_batch_size: 3
  initial_orders:
    - order_id: "CO-001"
      customer: "현대자동차"
      quantity: 500
      due_date: "2026-04-04"
    - order_id: "CO-002"
      customer: "기아자동차"
      quantity: 300
      due_date: "2026-04-05"

events:
  new_order: 0.15
  vibration_spike: 0.10
  equipment_stabilize: 0.15
  material_arrival: 0.05
  agv_change: 0.20
  speed_recovery: 0.10
  drift_recovery_prob: 0.10
  drift_spike_prob: 0.05
  urgent_order_ratio: 0.40
  spike_magnitude: [0.3, 1.0]

runtime:
  takt_sec: 2.5
  summary_interval: 15
  event_interval_range: [8, 25]

execution:
  max_cycles: 100
